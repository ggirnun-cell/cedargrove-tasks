# Render Blueprint (Infrastructure-as-code) — CLAUDE.md §10.
#
# M0 scope: a single STAGING web service that builds and serves the empty
# Next.js scaffold. No database, cron, or secrets yet — those are added in
# later milestones (Postgres in M1, the digest cron in M6, a separate
# production environment in M8).
#
# How Geoff uses this: in the Render dashboard choose "New > Blueprint",
# connect the GitHub repo, and Render reads this file to create the service.
# Managed Postgres (M1). PAID plan — the free plan expires after 90 days and
# deletes data, so it must never be used for staging or prod (CLAUDE.md §10).
# basic-256mb is the smallest paid tier (~$6/mo), ample for staff-internal use.
databases:
  - name: cedar-grove-db-staging
    plan: basic-256mb
    region: ohio
    postgresMajorVersion: "16"

# Shared env vars (M6). CRON_SECRET is auto-generated once and shared by the web
# service (which validates it on /api/cron/digest) and the cron job (which sends
# it) — so they always match and Geoff never types it.
envVarGroups:
  - name: cedar-grove-shared
    envVars:
      - key: CRON_SECRET
        generateValue: true

services:
  - type: web
    name: cedar-grove-tasks-staging
    runtime: node
    plan: starter # paid; free web services sleep and cold-start slowly.
    region: ohio
    branch: main
    autoDeploy: true # staging auto-deploys on every push to main (CLAUDE.md §10).
    # --include=dev forces devDependencies (tailwindcss, postcss, typescript) to
    # install even if NODE_ENV=production lingers on the service, which would
    # otherwise make npm skip them and break the build.
    buildCommand: npm ci --include=dev && npm run build
    # Apply pending DB migrations before each deploy goes live. Idempotent —
    # already-applied migrations are skipped. Seeding is a separate one-time
    # step (npm run db:seed), intentionally NOT run automatically.
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.14.0"
      # DATABASE_URL is injected from the managed database above — no secret is
      # ever typed by hand or committed.
      - key: DATABASE_URL
        fromDatabase:
          name: cedar-grove-db-staging
          property: connectionString
      # Clerk auth (M2). sync:false → Render prompts for these in the dashboard;
      # they are never stored in this file or in git. The publishable key is
      # public (shipped to the browser); the other two are secrets.
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      # Email engine (M6). RESEND_API_KEY + MAIL_FROM enable real sends; until
      # they're set, email logs-and-skips. APP_BASE_URL builds links in emails.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      # CRON_SECRET, shared with the cron job below so the digest endpoint
      # authenticates it.
      - fromGroup: cedar-grove-shared
      # NOTE: do NOT set NODE_ENV=production here. It makes `npm ci` skip
      # devDependencies (tailwindcss, postcss, typescript), which breaks the
      # build. Next.js already runs build and `next start` in production mode
      # automatically, so the runtime is unaffected.

  # Daily ping + escalation digest (M6). Fires once each morning and POSTs to the
  # web service's authed /api/cron/digest endpoint, which does the actual work.
  # 11:00 UTC ≈ 07:00 US Eastern (EDT; 06:00 during EST — Render cron is fixed
  # UTC with no DST, a 1-hour seasonal drift that's fine for a morning digest).
  - type: cron
    name: cedar-grove-digest-staging
    runtime: node
    region: ohio
    branch: main
    schedule: "0 11 * * *"
    buildCommand: npm ci
    startCommand: node scripts/trigger-digest.mjs
    envVars:
      - key: NODE_VERSION
        value: "20.14.0"
      - key: APP_BASE_URL
        sync: false # same staging URL as the web service
      - fromGroup: cedar-grove-shared
